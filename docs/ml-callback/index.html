<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>restPOS - MercadoLibre</title>
  <style>
    body { font-family: system-ui; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; max-width: 400px; }
    .code { background: #f0f0f0; padding: 8px 16px; border-radius: 8px; font-family: monospace; font-size: 1.2rem; margin: 1rem 0; word-break: break-all; }
    .success { color: #16a34a; }
    .error { color: #dc2626; }
  </style>
</head>
<body>
  <div class="card">
    <h2>restPOS - MercadoLibre</h2>
    <div id="status">Procesando autorizacion...</div>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const error = params.get('error');
    const el = document.getElementById('status');

    if (code) {
      el.innerHTML = '<p class="success">Autorizacion exitosa!</p>' +
        '<p>Copia este codigo y pegalo en restPOS:</p>' +
        '<div class="code">' + code + '</div>' +
        '<p style="color:#888;font-size:0.85rem">Puedes cerrar esta ventana.</p>';
    } else if (error) {
      el.innerHTML = '<p class="error">Error: ' + error + '</p>';
    } else {
      el.innerHTML = '<p>Esperando autorizacion de MercadoLibre...</p>';
    }
  </script>
</body>
</html>
