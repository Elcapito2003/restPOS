<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DUO - Menu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #FDF6E3; font-family: Georgia, 'Times New Roman', serif; }
    .page { width: 100%; max-width: 600px; margin: 0 auto; position: relative; min-height: 100vh; }
    .page img { width: 100%; display: block; }

    /* Swipe navigation */
    .menu-container { overflow-x: hidden; }
    .pages { display: flex; flex-direction: column; }

    /* Navigation dots */
    .nav-dots { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; z-index: 10; background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 20px; }
    .nav-dots span { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.4); cursor: pointer; }
    .nav-dots span.active { background: white; }

    /* Dynamic content overlay - for future when we have SVG illustrations */
    .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div class="menu-container">
    <div class="pages" id="pages">
      <!-- Pages loaded dynamically -->
    </div>
  </div>
  <div class="nav-dots" id="nav-dots"></div>

  <script>
    const API_URL = 'https://restpos-production-f38b.up.railway.app/api/public/menu';
    // Fallback for local dev
    const API_URLS = [
      API_URL,
      window.location.origin.replace(':5173', ':3001') + '/api/public/menu',
      'http://localhost:3001/api/public/menu',
    ];

    // Menu page images (hosted on GitHub Pages)
    const BASE = window.location.pathname.includes('/menu')
      ? window.location.pathname.replace('/menu/', '/menu/').replace('/index.html', '')
      : '/restPOS/menu';

    const pageImages = [
      { src: BASE + '/portada.png', id: 'portada' },
      { src: BASE + '/desayunos-salados.png', id: 'salados' },
      { src: BASE + '/desayunos-dulces.png', id: 'dulces' },
      { src: BASE + '/bebidas.png', id: 'bebidas' },
      { src: BASE + '/postres.png', id: 'postres' },
    ];

    // Render pages
    const pagesEl = document.getElementById('pages');
    const dotsEl = document.getElementById('nav-dots');

    pageImages.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'page';
      div.id = p.id;
      div.innerHTML = `<img src="${p.src}" alt="${p.id}" loading="${i === 0 ? 'eager' : 'lazy'}">`;
      pagesEl.appendChild(div);

      const dot = document.createElement('span');
      if (i === 0) dot.className = 'active';
      dot.onclick = () => {
        div.scrollIntoView({ behavior: 'smooth' });
        document.querySelectorAll('.nav-dots span').forEach(d => d.classList.remove('active'));
        dot.classList.add('active');
      };
      dotsEl.appendChild(dot);
    });

    // Update active dot on scroll
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const idx = pageImages.findIndex(p => p.id === entry.target.id);
          document.querySelectorAll('.nav-dots span').forEach((d, i) => {
            d.classList.toggle('active', i === idx);
          });
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('.page').forEach(p => observer.observe(p));
  </script>
</body>
</html>
