services:
  postgres:
    image: postgres:16-alpine
    container_name: restpos-db
    environment:
      POSTGRES_DB: restpos
      POSTGRES_USER: restpos
      POSTGRES_PASSWORD: restpos123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
